# pytest.ini
# Pytest configuration for E-Commerce Analytics Project

[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Options always used
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    
# Markers for categorizing tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    edge_case: marks tests that cover edge cases
    
# Coverage settings
[coverage:run]
source = src
omit = 
    */tests/*
    */test_*.py
    
[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
