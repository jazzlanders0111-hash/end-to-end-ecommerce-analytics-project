# ============================================================================
# NOTEBOOK 01: Data Wrangling & Exploration
# ============================================================================
notebook1:
  random_state: 42
  
  data_loading:
    chunksize: 100000
    low_memory: true
    encoding: 'utf-8'
    error_bad_lines: false
    warn_bad_lines: true
    compression: 'infer'

  display:
    max_columns: null
    max_rows: 100
    float_format: '{:.2f}'
    precision: 2
  
  eda:
    transaction_cols:
      - total_amount
      - quantity
      - discount
      - shipping_cost
    rfm_cols:
      - recency_days
      - frequency
      - monetary
      - loyalty_score
    categorical_cols:
      - category
      - region
      - payment_method
      - customer_gender
  
  outlier:
    method: IQR
    iqr_multiplier: 1.5
    high_outlier_pct_threshold: 5.0
  
  statistical_tests:
    normality_sample_size: 5000
    normality_alpha: 0.05
    correlation_threshold: 0.5
    chi_square_alpha: 0.05
  
  business_rules:
    max_acceptable_data_loss_pct: 5.0
    churn_benchmark_critical: 60.0
    churn_benchmark_elevated: 40.0
    return_rate_healthy_max: 10.0
    return_rate_above_avg_max: 15.0
    revenue_concentration_high: 40.0
    revenue_concentration_moderate: 25.0
    mean_median_ratio_threshold: 1.5
    top20_concentration_high: 70.0
    one_time_buyer_threshold: 40.0
  
  loyalty_segments:
    labels:
      - Bronze
      - Silver
      - Gold
      - Platinum
  
  cleaning:
    auto_fix_negatives: true
    imputation_strategy:
      numeric: 'median'
      categorical: 'mode'
    unknown_value: 'Unknown'
    empty_values: ['', 'Nan', 'None', 'nan', 'null', 'NULL']
  
  missing_data:
    critical_threshold_pct: 50.0
    low_threshold_pct: 5.0
    alpha: 0.05
  
  quality_score:
    completeness_weight: 40.0
    compliance_weight: 30.0
    retention_weight: 30.0
    thresholds:
      excellent: 90.0
      good: 75.0
      fair: 60.0
  
  enhanced_analysis:
    churn_threshold_days: 120
    loyal_customer_min_orders: 5
    super_loyal_min_orders: 10
    at_risk_threshold_multiplier: 0.75
  
  compression:
    type: 'snappy'
    index: false
  
  expected_dtypes:
    order_id: 'object'
    customer_id: 'object'
    product_id: 'object'
    category: 'object'
    payment_method: 'object'
    region: 'object'
    customer_gender: 'object'
    price: ['float64', 'float32']
    discount: ['float64', 'float32']
    quantity: ['int64', 'int32', 'int16', 'int8']
    total_amount: ['float64', 'float32']
    shipping_cost: ['float64', 'float32']
    profit_margin: ['float64', 'float32']
    customer_age: ['int64', 'int32', 'int16', 'int8']
    delivery_time_days: ['int64', 'int32', 'int16', 'int8']
    returned: ['int64', 'int32', 'int16', 'int8']
    order_date: 'datetime64[ns]'

