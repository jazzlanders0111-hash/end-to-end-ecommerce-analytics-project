# ============================================================================
# NOTEBOOK 04: Churn Prediction — Time-Based Methodology
# ============================================================================
notebook4:

  # ── Flat aliases ────────────────────────────────────────────────────────────
  # Read directly by n4a_utils.validate_config() and n4b_time_split.
  observation_window_days: 180
  test_size: 0.2
  random_state: 42

  display:
    max_columns: null
    max_rows: 100
    float_format: '{:.2f}'
    precision: 2

  # ── Churn label definition ──────────────────────────────────────────────────
  churn:
    cutoff_date: null            # null → auto: max_date − observation_window_days
    feature_lookback: 365        # Days before cutoff used to compute behavioral features
    min_orders: 1                # Minimum pre-cutoff orders to include a customer

  # ── Model training ──────────────────────────────────────────────────────────
  training:
    logistic_regression:
      max_iter: 1000
      random_state: 42
      class_weight: 'balanced'
      solver: 'lbfgs'

    random_forest:
      n_estimators: 200
      max_depth: 15
      min_samples_split: 10
      min_samples_leaf: 5
      random_state: 42
      class_weight: 'balanced'
      n_jobs: -1

    xgboost:
      n_estimators: 200
      max_depth: 6
      learning_rate: 0.1
      subsample: 0.8
      colsample_bytree: 0.8
      random_state: 42

  # ── Evaluation ──────────────────────────────────────────────────────────────
  # Thresholds are intentionally strict — they gate production readiness.
  evaluation:
    primary_metric: 'f1'
    thresholds:
      min_accuracy:  0.75
      min_precision: 0.70
      min_recall:    0.70
      min_f1:        0.70
      min_roc_auc:   0.80

  # ── Feature importance ──────────────────────────────────────────────────────
  feature_importance:
    top_n_features: 20
    cumulative_thresholds: [50, 80, 95]

  # ── Feature engineering ─────────────────────────────────────────────────────
  feature_engineering:
    # Initial default strategy. Overridden at runtime by VIF analysis:
    # strategies are defined in strategy_map in the notebook — whichever
    # passes VIF with the highest F1 is selected programmatically.
    strategy: 'base'

    vif_threshold: 5.0
    imputation_strategy: 'median'
    scaling_method: 'standard'

  # ── Risk stratification ─────────────────────────────────────────────────────
  risk_stratification:
    method: 'quantile'           # 'quantile' | 'threshold'
    quantiles:
      low:  0.33
      high: 0.67
    thresholds:
      low:  0.30
      high: 0.70
    risk_levels:
      - 'Low'
      - 'Medium'
      - 'High'

  # ── Business insights ───────────────────────────────────────────────────────
  business_insights:
    top_n_drivers: 3
    campaigns:
      high_risk:
        discount_pct:      30
        response_target:   0.15
        retention_target:  0.30
      medium_risk:
        discount_pct:      15
        response_target:   0.25
        retention_target:  0.50
      low_risk:
        discount_pct:      10
        response_target:   0.20
        retention_target:  0.85
    roi:
      campaign_cost_pct:          0.10
      expected_retention_high:    0.30
      expected_retention_medium:  0.50
      expected_retention_low:     0.85

# ============================================================================
# NOTEBOOK 05: Fraud Detection & Anomaly Analysis
# ============================================================================
notebook5:
  random_state: 42

  display:
    max_columns: null
    max_rows: 100
    float_format: '{:.4f}'
    precision: 4

  features:
    - return_rate
    - high_discount_return_rate
    - discount_usage_rate
    - max_discount_rate
    - always_max_discount
    - negative_margin_rate
    - max_orders_7d
    - velocity_burst_flag
    - gap_cv
    - high_value_rate_p95
    - high_value_rate_p99
    - category_hhi
    - order_value_cv
    - aov_zscore
    - n_payment_methods
    - payment_concentration

  fraud:
    rule_thresholds:
      return_rate_high: 0.20
      discount_rate_high: 0.80
      velocity_order_count: 3.0
      negative_margin_rate_high: 0.50
      high_value_p99_rate: 0.20
      category_hhi_threshold: 0.90

    scoring:
      weights:
        return_abuse: 0.20
        discount_exploitation: 0.15
        high_discount_returns: 0.20
        velocity_anomaly: 0.15
        margin_exploitation: 0.15
        order_value_anomaly: 0.10
        category_concentration: 0.05
      blend_weights:
        rule_score: 0.40
        iso_score: 0.30
        lof_score: 0.30

  models:
    isolation_forest:
      contamination: 0.05
      n_estimators: 200
      random_state: 42
    lof:
      n_neighbors: 20
      contamination: 0.05

  risk_tiers:
    critical_threshold: 0.80
    high_threshold: 0.60
    medium_threshold: 0.35

  validation:
    max_high_critical_pct: 15.0

  # NOTE: interventions block is currently unused by n5g_insights.py.
  # build_intervention_recommendations() reads this key but the variable
  # is never referenced — action strings and SLA hours are hardcoded.
  # Kept here for future refactoring; a dev pass should wire these values in.
  interventions:
    critical:
      action: "Immediate account review and manual verification"
      review_sla_hours: 24
    high:
      action: "Priority review queue — resolve within 72 hours"
      review_sla_hours: 72
    medium:
      action: "Enhanced monitoring — silent flags on next high-value order"
      review_sla_hours: 168

# ============================================================================
# Environment-Specific Overrides
# ============================================================================
development:
  environment: development

production:
  environment: production
  rfm:
    cache_ttl_hours: 12
  notebook4:
    # NB03 segment evidence: Lost Customers mean recency=415d (94.3% churned),
    # High-Value at Risk mean recency=153d (32.3% churned).
    # The behavioural boundary between at-risk and lost falls at ~120-180d.
    # Production uses the same 180-day window for consistency with development.
    observation_window_days: 180
# ============================================================================
# NOTEBOOK 06: Cohort Retention & Lifecycle Analysis
# ============================================================================
notebook6:
  random_state: 42

  display:
    max_columns: null
    max_rows: 100
    float_format: '{:,.4f}'
    precision: 4

  business_rules:
    min_cohort_size: 30
    healthy_retention_month1: 0.25     # M+1 retention benchmark — below this flags a problem
    critical_dropout_pct: 0.70         # M+1 dropout threshold that triggers a WARNING
    ltv_window_months: 12              # Primary LTV window used in benchmarks and projections

  statistical_tests:
    outlier_z_threshold: 1.5           # |z-score| threshold for flagging outlier cohorts
    spearman_threshold: 0.3            # |rho| threshold for meaningful AOV trend direction
    alpha: 0.05                        # Significance level for all hypothesis tests

  ltv:
    benchmark_windows: [1, 3, 6, 12]       # Windows (months) passed to compute_ltv_benchmarks()
    segment_windows: [3, 6, 12]            # Windows used for loyalty-tier segment LTV summary
    nb03_segment_windows: [1, 3, 6, 12]   # Windows used for NB03 cluster segment LTV summary

  scenarios:
    improvement_increments: [0.05, 0.10, 0.15]  # Retention lift scenarios to model (pp)
    periods: [1, 3]                              # Period offsets to compute uplift at

  nb03_segments:
    order:
      - 'Loyal Customers'
      - 'High-Value at Risk'
      - 'Needs Engagement'
      - 'Lost Customers'
    comparison_periods: 9   # Number of leading periods to show in the HVAR vs Loyal table

  # ── Segment colour palettes ─────────────────────────────────────────────────
  # Used by plot_retention_by_segment() in n6f_segment_retention.py.
  # Fix: two near-identical yellow/amber tones were previously rendered for
  # Gold and a second series because no explicit mapping existed — the function
  # fell back to the global COLORS cycling, which repeats #F57C00 / #EA731D.
  segment_colors:
    loyalty_tiers:
      Bronze:   '#CD7F32'   # warm copper-brown  — visually "bronze"
      Silver:   '#757575'   # neutral mid-grey   — visually "silver"
      Gold:     '#F59D5A'   # warm amber/saffron  — distinct from orange
      Platinum: '#1B1F5E'   # deep navy           — premium / primary brand
    nb03_segments:
      Loyal Customers:    '#2E7D32'   # forest green  — positive / healthy
      High-Value at Risk: '#F57C00'   # warning amber — caution
      Needs Engagement:   '#1395F8'   # clear blue    — actionable
      Lost Customers:     '#C62828'   # danger red    — urgent
    first_category: null   # null → cycle through viz.color_palette